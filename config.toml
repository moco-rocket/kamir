[paths]
mtgjson_db = "data/db/AllPrintings.sqlite"
kamir_db   = "data/db/kamir_cardpool.sqlite"
log_file   = "logs/kamir.log"

[play]
# If false, show a confirmation prompt before printing each card.
auto_print = true

[printer]
# USB device path on Raspberry Pi (check with: ls /dev/usb/lp*)
device = "/dev/usb/lp0"

[sets]
# Set allowed = "*" or allowed = ["*"] to include every physical-play set in
# AllPrintings.sqlite (expansions, core sets, Commander, Masters, etc.)
# excluding Un-sets and digital-only sets.
# Or specify an explicit list of set codes as shown below.
allowed = [
    "LEA", "2ED", "ARN", "ATQ", "3ED", "LEG", "PDRC", "DRK", "PHPR", "FEM",
    "4ED", "ICE", "HML", "ALL", "MIR", "VIS", "5ED", "POR", "WTH",
    "TMP", "STH", "EXO", "P02", "USG", "ULG", "6ED", "UDS", "S99",
    "PTK", "MMQ", "NEM", "PCY", "INV", "PLS", "7ED", "APC", "ODY",
    "TOR", "JUD", "ONS", "LGN", "SCG", "8ED", "MRD", "DST", "5DN",
    "CHK", "BOK", "SOK", "9ED", "RAV", "GPT", "DIS", "CSP", "TSP",
    "PLC", "FUT", "10E", "LRW", "MOR", "SHM", "EVE", "ALA", "CON",
