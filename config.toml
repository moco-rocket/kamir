[paths]
mtgjson_db = "data/db/AllPrintings.sqlite"
kamir_db   = "data/db/kamir_cardpool.sqlite"
log_file   = "logs/kamir.log"

[play]
# If false, show a confirmation prompt before printing each card.
auto_print = true

[printer]
# USB device path on Raspberry Pi (check with: ls /dev/usb/lp*)
device = "/dev/usb/lp0"

[sets]
# Set allowed = "all" to include every physical-play set in AllPrintings.sqlite
# (expansions, core sets, Commander, Masters, etc.) excluding Un-sets and
# digital-only sets.  Or specify an explicit list of set codes as shown below.
allowed = [
    "LEA", "2ED", "ARN", "ATQ", "3ED", "LEG", "PDRC", "DRK", "PHPR", "FEM",
    "4ED", "ICE", "HML", "ALL", "MIR", "VIS", "5ED", "POR", "WTH",
