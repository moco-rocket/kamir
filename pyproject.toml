[project]
name = "kamir"
version = "0.1.0"
description = "Printable proxy card generator for a Momir Basic-like MTG variant"
requires-python = ">=3.11"
dependencies = [
    "pillow>=10.0",
    "reportlab>=4.0",
    "requests>=2.31",
    "tqdm>=4.66",
]

[project.scripts]
kamir = "kamir.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kamir"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
